name: auth-service CI

on:
  push:
    branches: [main]
    paths:
      - "services/auth-service/**"
      - "shared/**"
      - ".github/workflows/auth-service.yml"
  pull_request:
    paths:
      - "services/auth-service/**"
      - "shared/**"
      - ".github/workflows/auth-service.yml"

# Template for the other services: copy this file, replace every "auth-service"/"AuthService"
# occurrence with the target service's name, and adjust the `paths:` filters above so each
# service's pipeline only runs when that service (or /shared) actually changed.

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore services/auth-service/AuthService.Api/AuthService.Api.csproj

      - name: Build
        run: dotnet build services/auth-service/AuthService.Api/AuthService.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test services/auth-service/AuthService.Tests/AuthService.Tests.csproj -c Release

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth-service/AuthService.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }},ghcr.io/${{ github.repository }}/auth-service:latest
