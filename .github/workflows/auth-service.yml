name: auth-service CI

on:
  push:
    branches: [main]
    paths:
      - "services/auth-service/**"
      - "shared/**"
      - ".github/workflows/auth-service.yml"
  pull_request:
    paths:
      - "services/auth-service/**"
      - "shared/**"
      - ".github/workflows/auth-service.yml"

# Template for the other services: copy this file, replace every "auth-service"/"AuthService"
# occurrence with the target service's name, and adjust the `paths:` filters above so each
# service's pipeline only runs when that service (or /shared) actually changed. The `services:`
# and `env:` blocks under `build-test` (real SQL Server for integration tests) and the
# CI_MSSQL_SA_PASSWORD secret they depend on are shared across every service's workflow —
# copy them as-is, no per-service renaming needed there.

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Real SQL Server for integration tests — see AuthApiFactory: with TEST_MSSQL_CONNECTION set,
    # every IClassFixture<AuthApiFactory> test class gets its own auth_tests_<guid> database,
    # migrated up before tests run and dropped after. Without this env var (e.g. a local
    # `dotnet test` run) the same tests fall back to EF Core InMemory automatically.
    # No Docker-level --health-cmd on the mssql service: a `docker create --health-cmd="..."`
    # single-line shell string embedding the secret proved unreliable in this exact CI environment
    # (SQL Server itself was ready in ~4s every time per its own log, but Docker kept reporting
    # the container unhealthy for the full retry budget regardless of syntax tried — root cause
    # never confirmed). Explicit "Wait for SQL Server" step below is a normal multi-line bash
    # script instead, which is both more robust (proper quoting, no docker-create argument-string
    # fragility) and more debuggable (its sqlcmd output goes straight into the regular step log,
    # unlike Docker's opaque healthcheck probe log).
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.CI_MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
    env:
      TEST_MSSQL_CONNECTION: Server=localhost,1433;User Id=sa;Password=${{ secrets.CI_MSSQL_SA_PASSWORD }};TrustServerCertificate=True
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Wait for SQL Server
        env:
          MSSQL_SA_PASSWORD: ${{ secrets.CI_MSSQL_SA_PASSWORD }}
        run: |
          container=$(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest")
          echo "mssql container id: $container"
          for i in $(seq 1 30); do
            if docker exec "$container" /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null; then
              echo "SQL Server is ready (attempt $i)"
              exit 0
            fi
            echo "SQL Server not ready yet, attempt $i/30..."
            sleep 5
          done
          echo "SQL Server did not become ready in time"
          docker logs "$container"
          exit 1

      - name: Restore
        run: dotnet restore services/auth-service/AuthService.Api/AuthService.Api.csproj

      - name: Build
        run: dotnet build services/auth-service/AuthService.Api/AuthService.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test services/auth-service/AuthService.Tests/AuthService.Tests.csproj -c Release

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth-service/AuthService.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }},ghcr.io/${{ github.repository }}/auth-service:latest
# trigger fresh CI run with updated secret - 1784268612
