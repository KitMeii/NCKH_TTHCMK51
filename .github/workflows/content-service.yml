name: content-service CI

on:
  push:
    branches: [main]
    paths:
      - "services/content-service/**"
      - "shared/**"
      - ".github/workflows/content-service.yml"
  pull_request:
    paths:
      - "services/content-service/**"
      - "shared/**"
      - ".github/workflows/content-service.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Real SQL Server for integration tests — see ContentApiFactory / auth-service.yml for the
    # full rationale. Shares the CI_MSSQL_SA_PASSWORD secret with every other service's workflow.
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.CI_MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd='/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null || exit 1'
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      TEST_MSSQL_CONNECTION: Server=localhost,1433;User Id=sa;Password=${{ secrets.CI_MSSQL_SA_PASSWORD }};TrustServerCertificate=True
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore services/content-service/ContentService.Api/ContentService.Api.csproj

      - name: Build
        run: dotnet build services/content-service/ContentService.Api/ContentService.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test services/content-service/ContentService.Tests/ContentService.Tests.csproj -c Release

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/content-service/ContentService.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/content-service:${{ github.sha }},ghcr.io/${{ github.repository }}/content-service:latest
