name: gateway CI

on:
  push:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "shared/**"
      - ".github/workflows/gateway.yml"
  pull_request:
    paths:
      - "services/gateway/**"
      - "shared/**"
      - ".github/workflows/gateway.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore services/gateway/Gateway/Gateway.csproj

      - name: Build
        run: dotnet build services/gateway/Gateway/Gateway.csproj --no-restore -c Release

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository/tag names must be lowercase; ${{ github.repository }} isn't guaranteed to
      # be (this repo's owner is "KitMeii", mixed case) — compute a lowercase version once here.
      - name: Compute lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/gateway/Gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.image.outputs.repo }}/gateway:${{ github.sha }},ghcr.io/${{ steps.image.outputs.repo }}/gateway:latest
