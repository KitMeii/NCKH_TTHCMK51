name: progress-service CI

on:
  push:
    branches: [main]
    paths:
      - "services/progress-service/**"
      - "shared/**"
      - ".github/workflows/progress-service.yml"
  pull_request:
    paths:
      - "services/progress-service/**"
      - "shared/**"
      - ".github/workflows/progress-service.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore services/progress-service/ProgressService.Api/ProgressService.Api.csproj

      - name: Build
        run: dotnet build services/progress-service/ProgressService.Api/ProgressService.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test services/progress-service/ProgressService.Tests/ProgressService.Tests.csproj -c Release

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/progress-service/ProgressService.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/progress-service:${{ github.sha }},ghcr.io/${{ github.repository }}/progress-service:latest
