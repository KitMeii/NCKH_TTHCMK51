name: quiz-service CI

on:
  push:
    branches: [main]
    paths:
      - "services/quiz-service/**"
      - "shared/**"
      - ".github/workflows/quiz-service.yml"
  pull_request:
    paths:
      - "services/quiz-service/**"
      - "shared/**"
      - ".github/workflows/quiz-service.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Real SQL Server for integration tests — see QuizApiFactory / auth-service.yml for the full
    # rationale. Shares the CI_MSSQL_SA_PASSWORD secret with every other service's workflow.
    # See auth-service.yml for why there's no Docker-level --health-cmd here (proved unreliable
    # in CI regardless of quoting) and an explicit polling step instead.
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: ${{ secrets.CI_MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
    env:
      TEST_MSSQL_CONNECTION: Server=localhost,1433;User Id=sa;Password=${{ secrets.CI_MSSQL_SA_PASSWORD }};TrustServerCertificate=True
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Wait for SQL Server
        env:
          MSSQL_SA_PASSWORD: ${{ secrets.CI_MSSQL_SA_PASSWORD }}
        run: |
          container=$(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest")
          echo "mssql container id: $container"
          for i in $(seq 1 30); do
            if docker exec "$container" /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null; then
              echo "SQL Server is ready (attempt $i)"
              exit 0
            fi
            echo "SQL Server not ready yet, attempt $i/30..."
            sleep 5
          done
          echo "SQL Server did not become ready in time"
          docker logs "$container"
          exit 1

      - name: Restore
        run: dotnet restore services/quiz-service/QuizService.Api/QuizService.Api.csproj

      - name: Build
        run: dotnet build services/quiz-service/QuizService.Api/QuizService.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test services/quiz-service/QuizService.Tests/QuizService.Tests.csproj -c Release

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository/tag names must be lowercase; ${{ github.repository }} isn't guaranteed to
      # be (this repo's owner is "KitMeii", mixed case) — compute a lowercase version once here.
      - name: Compute lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/quiz-service/QuizService.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.image.outputs.repo }}/quiz-service:${{ github.sha }},ghcr.io/${{ steps.image.outputs.repo }}/quiz-service:latest
