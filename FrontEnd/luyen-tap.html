<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luyện tập - Giảng viên Ảo TTHCM</title>
    <link rel="stylesheet" href="../style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="../api-client.js"></script>
    <style>
      .option-btn.selected {
        border-color: var(--red);
        background: var(--red-bg);
      }
      .review-item {
        padding: 10px 0;
        border-bottom: 1px solid var(--gray-100);
      }
      .review-item:last-child {
        border-bottom: none;
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <a href="index.html" class="logo-wrap">
          <div class="logo-badge"><i class="fas fa-star"></i>MTA</div>
          <div class="logo-info">
            <div class="logo-title">Luyện tập</div>
            <div class="logo-sub">Ôn tập Tư tưởng Hồ Chí Minh</div>
          </div>
        </a>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <!-- SELECT SCREEN -->
        <div id="selectScreen">
          <div class="page-title">Chọn chương để luyện tập</div>

          <div id="chapterList">
            <div class="empty" style="padding: 30px 0">
              <i
                class="fas fa-spinner fa-spin"
                style="font-size: 1.5rem; color: var(--red)"
              ></i>
              <div
                style="
                  margin-top: 8px;
                  font-size: 0.82rem;
                  color: var(--gray-500);
                "
              >
                Đang tải câu hỏi...
              </div>
            </div>
          </div>

          <!-- Tài liệu bài giảng -->
          <div
            id="matCardLT"
            style="
              display: none;
              background: white;
              border-radius: var(--radius);
              padding: 16px;
              margin-bottom: 14px;
              box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            "
          >
            <div
              style="
                font-weight: 700;
                font-size: 0.87rem;
                margin-bottom: 10px;
                display: flex;
                align-items: center;
                gap: 8px;
              "
            >
              <i class="fas fa-book-open" style="color: var(--red)"></i> Tài
              liệu ôn tập
            </div>
            <div
              id="matListLT"
              style="display: flex; flex-direction: column; gap: 7px"
            ></div>
          </div>

          <div class="card" style="text-align: center">
            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 12px;
              "
            >
              <div>
                <div
                  style="
                    font-family: &quot;Oswald&quot;, sans-serif;
                    font-size: 1.6rem;
                    font-weight: 700;
                    color: var(--red);
                  "
                  id="totalDone"
                >
                  —
                </div>
                <div style="font-size: 0.7rem; color: var(--gray-500)">
                  Bài đã luyện
                </div>
              </div>
              <div>
                <div
                  style="
                    font-family: &quot;Oswald&quot;, sans-serif;
                    font-size: 1.6rem;
                    font-weight: 700;
                    color: #2e7d32;
                  "
                  id="bestQuiz"
                >
                  —
                </div>
                <div style="font-size: 0.7rem; color: var(--gray-500)">
                  Điểm cao nhất
                </div>
              </div>
              <div>
                <div
                  style="
                    font-family: &quot;Oswald&quot;, sans-serif;
                    font-size: 1.6rem;
                    font-weight: 700;
                    color: var(--gold-light);
                  "
                  id="quizCount"
                >
                  —
                </div>
                <div style="font-size: 0.7rem; color: var(--gray-500)">
                  Lần luyện tập
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quizScreen" style="display: none">
          <div class="card">
            <div class="quiz-header">
              <div class="quiz-counter" id="qCounter">Câu 1/10</div>
              <div class="quiz-score" id="qScore">✓ 0 đúng</div>
            </div>
            <div class="prog-track">
              <div class="prog-fill" id="qProg" style="width: 0%"></div>
            </div>
            <div
              style="
                margin-top: 16px;
                font-size: 0.95rem;
                font-weight: 600;
                line-height: 1.5;
                min-height: 60px;
              "
              id="questionText"
            ></div>
            <div id="optionsArea" style="margin-top: 16px"></div>
            <div
              id="explanationBox"
              style="
                display: none;
                margin-top: 12px;
                background: var(--red-bg);
                border-left: 3px solid var(--red);
                padding: 12px;
                border-radius: var(--radius-sm);
                font-size: 0.82rem;
                color: var(--gray-700);
              "
            ></div>
          </div>
          <div style="display: flex; gap: 10px">
            <button class="btn btn-outline btn-full" onclick="exitQuiz()">
              <i class="fas fa-times"></i> Thoát
            </button>
            <button
              class="btn btn-red btn-full"
              id="nextBtn"
              style="display: none"
              onclick="nextQ()"
            >
              <i class="fas fa-arrow-right"></i> Câu tiếp
            </button>
          </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="resultScreen" style="display: none">
          <div class="card result-card">
            <div id="resultEmoji" style="font-size: 3rem; margin-bottom: 8px">
              🎉
            </div>
            <div class="result-score" id="resultScore">0</div>
            <div style="font-size: 1rem; font-weight: 700; margin-top: 2px">
              /10 điểm
            </div>
            <div class="result-label" id="resultMsg">—</div>
            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin: 20px 0;
                text-align: left;
              "
            >
              <div
                style="
                  background: var(--gray-50);
                  padding: 12px;
                  border-radius: var(--radius);
                "
              >
                <div style="font-size: 0.7rem; color: var(--gray-500)">
                  Đúng
                </div>
                <div
                  style="
                    font-family: &quot;Oswald&quot;, sans-serif;
                    font-size: 1.5rem;
                    font-weight: 700;
                    color: #2e7d32;
                  "
                  id="rCorrect"
                >
                  0
                </div>
              </div>
              <div
                style="
                  background: var(--gray-50);
                  padding: 12px;
                  border-radius: var(--radius);
                "
              >
                <div style="font-size: 0.7rem; color: var(--gray-500)">Sai</div>
                <div
                  style="
                    font-family: &quot;Oswald&quot;, sans-serif;
                    font-size: 1.5rem;
                    font-weight: 700;
                    color: var(--red);
                  "
                  id="rWrong"
                >
                  0
                </div>
              </div>
            </div>
            <div
              style="font-size: 0.78rem; color: #2e7d32; margin-bottom: 16px"
              id="savedMsg"
            ></div>
            <div style="display: flex; flex-direction: column; gap: 8px">
              <button class="btn btn-red btn-full" id="retryBtn">
                <i class="fas fa-redo"></i> Làm lại
              </button>
              <button class="btn btn-outline btn-full" onclick="exitQuiz()">
                <i class="fas fa-list"></i> Chọn chương khác
              </button>
            </div>
          </div>

          <!-- Xem lại từng câu — đáp án đúng chỉ hiển thị SAU khi nộp bài,
               vì server chấm điểm chứ không phải client (xem QuizAttemptService). -->
          <div class="card">
            <div class="card-title">
              <i class="fas fa-list-check"></i>Xem lại chi tiết
            </div>
            <div id="reviewList"></div>
          </div>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item"
        ><i class="fas fa-home"></i><span>Trang chủ</span></a
      >
      <a href="chat.html" class="nav-item"
        ><i class="fas fa-robot"></i><span>Chat AI</span></a
      >
      <a href="luyen-tap.html" class="nav-item active"
        ><i class="fas fa-book"></i><span>Luyện tập</span></a
      >
      <a href="thi-thu.html" class="nav-item"
        ><i class="fas fa-pencil-alt"></i><span>Thi thử</span></a
      >
      <a href="tien-do.html" class="nav-item"
        ><i class="fas fa-calendar-alt"></i><span>Tiến độ</span></a
      >
      <a href="xep-hang.html" class="nav-item"
        ><i class="fas fa-trophy"></i><span>Bảng XH</span></a
      >
      <a href="giang-bai.html" class="nav-item"
        ><i class="fas fa-chalkboard-teacher"></i><span>Giảng bài</span></a
      >
      <a href="cai-dat.html" class="nav-item" id="navSettings"
        ><i class="fas fa-cog"></i><span>Tài khoản</span></a
      >
      <a href="admin.html" class="nav-item" id="navAdmin"
        ><i class="fas fa-shield-alt"></i><span>Tài khoản</span></a
      >
    </nav>

    <script>
      (function () {
        var session = getSession();
        var role = session && session.user && session.user.role;
        if (role === "Teacher" || role === "Admin") {
          document.getElementById("navSettings")?.remove();
          var navAdmin = document.getElementById("navAdmin");
          if (navAdmin) {
            navAdmin.href =
              role === "Admin"
                ? "admin/quan-tri-he-thong.html"
                : "teacher/quan-ly-noi-dung.html";
          }
        } else {
          document.getElementById("navAdmin")?.remove();
        }
      })();
    </script>

    <script>
      if (localStorage.getItem("darkMode") === "1")
        document.body.classList.add("dark");

      const LETTERS = ["A", "B", "C", "D"];
      let allChapters = {}; // { chapterName: [{id,q,opts}] }
      let currentChapter = "";
      let questions = [],
        currentIdx = 0,
        answers = [];

      // ======================== INIT ========================
      async function init() {
        if (!requireAuth()) return;
        await loadQuestions();
        loadMaterialsForPractice();
        loadStats();
      }

      // ======================== LOAD FROM API ========================
      // Ngân hàng câu hỏi được Giáo viên/Admin quản lý ở admin.html — trang này chỉ đọc
      // (endpoint /practice không trả correctAnswer/explanation, xem QuestionService.ListForPracticeAsync).
      async function loadQuestions() {
        const data = await getPracticeQuestions();
        allChapters = {};
        data.forEach((q) => {
          const ch = q.chapter || "Chưa phân loại";
          if (!allChapters[ch]) allChapters[ch] = [];
          allChapters[ch].push({
            id: q.id,
            q: q.questionText,
            opts: [q.optionA, q.optionB, q.optionC, q.optionD].filter(Boolean),
          });
        });
        await renderChapterList();
      }

      async function renderChapterList() {
        const chNames = Object.keys(allChapters);
        const listEl = document.getElementById("chapterList");

        if (chNames.length === 0) {
          listEl.innerHTML = `<div class="card" style="text-align:center;padding:24px;">
      <i class="fas fa-folder-open" style="font-size:2rem;color:var(--gray-300);margin-bottom:10px;display:block;"></i>
      <div style="font-weight:700;margin-bottom:6px;">Chưa có câu hỏi</div>
      <div style="font-size:0.8rem;color:var(--gray-500);margin-bottom:14px;">Giáo viên chưa thêm câu hỏi cho môn học này.</div>
    </div>`;
          return;
        }

        const totalQ = Object.values(allChapters).reduce(
          (s, v) => s + v.length,
          0,
        );

        let wrongCount = 0;
        try {
          wrongCount = (await getWrongAnswers()).length;
        } catch (e) {}

        listEl.innerHTML = `
    <div class="card">
      ${
        wrongCount > 0
          ? `<div class="chapter-btn" onclick="startQuiz('__wrong__')" style="background:#fff3f3;border:1.5px solid #ffcdd2;">
        <div class="chapter-num" style="background:linear-gradient(135deg,#c62828,#b71c1c);color:white;"><i class="fas fa-redo" style="font-size:0.8rem;"></i></div>
        <div class="chapter-info">
          <div class="chapter-name" style="color:#c62828;">Ôn tập câu trả lời sai</div>
          <div class="chapter-meta" style="color:#e57373;">${wrongCount} câu</div>
        </div>
        <i class="fas fa-chevron-right" style="color:#e57373"></i>
      </div>`
          : ""
      }
      <div class="chapter-btn" onclick="startQuiz('__all__')">
        <div class="chapter-num" style="background:linear-gradient(135deg,#b71c1c,#c62828);color:white;">★</div>
        <div class="chapter-info">
          <div class="chapter-name">Tất cả chương (Ngẫu nhiên)</div>
          <div class="chapter-meta">${totalQ} câu · Ngẫu nhiên</div>
        </div>
        <i class="fas fa-chevron-right" style="color:var(--gray-400)"></i>
      </div>
      ${chNames
        .map(
          (ch, i) => `
        <div class="chapter-btn" onclick="startQuiz('${ch.replace(/'/g, "\\'")}')">
          <div class="chapter-num">${i + 1}</div>
          <div class="chapter-info">
            <div class="chapter-name">${ch}</div>
            <div class="chapter-meta">${allChapters[ch].length} câu</div>
          </div>
          <i class="fas fa-chevron-right" style="color:var(--gray-400)"></i>
        </div>`,
        )
        .join("")}
    </div>`;
      }

      // ======================== QUIZ ========================
      async function startQuiz(chapter) {
        currentChapter = chapter;

        if (chapter === "__wrong__") {
          const wrongs = await getWrongAnswers();
          if (!wrongs.length) {
            alert("Bạn chưa có câu nào trả lời sai! 🎉");
            return;
          }
          const wrongIds = new Set(wrongs.map((w) => w.questionId));
          questions = shuffle(
            Object.values(allChapters)
              .flat()
              .filter((q) => wrongIds.has(q.id)),
          );
        } else {
          questions =
            chapter === "__all__"
              ? shuffle(Object.values(allChapters).flat()).slice(0, 20)
              : shuffle([...(allChapters[chapter] || [])]);
        }

        if (questions.length === 0) return alert("Chương này chưa có câu hỏi!");

        currentIdx = 0;
        answers = [];
        document.getElementById("selectScreen").style.display = "none";
        document.getElementById("resultScreen").style.display = "none";
        document.getElementById("quizScreen").style.display = "block";
        loadQ();
        logStudyTime(2).catch(() => {});
      }

      function loadQ() {
        const q = questions[currentIdx];
        document.getElementById("qCounter").textContent =
          `Câu ${currentIdx + 1}/${questions.length}`;
        document.getElementById("qScore").textContent =
          `${answers.length} đã trả lời`;
        document.getElementById("qProg").style.width =
          (currentIdx / questions.length) * 100 + "%";
        document.getElementById("questionText").textContent = q.q;
        document.getElementById("explanationBox").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("optionsArea").innerHTML = q.opts
          .map(
            (o, i) =>
              `<button class="option-btn" onclick="selectAns(${i})" id="opt${i}"><div class="opt-letter">${LETTERS[i]}</div><span>${o}</span></button>`,
          )
          .join("");
      }

      // Chỉ ghi nhận lựa chọn — KHÔNG chấm điểm ở đây. Đáp án đúng chỉ được server
      // (quiz-service) tiết lộ sau khi nộp toàn bộ bài, đó là cách khắc phục lỗ hổng cũ
      // (client tải sẵn đáp án rồi tự chấm điểm, có thể giả mạo điểm số).
      function selectAns(sel) {
        const q = questions[currentIdx];
        document
          .querySelectorAll(".option-btn")
          .forEach((b) => (b.disabled = true));
        document.getElementById(`opt${sel}`).classList.add("selected");
        answers.push({ questionId: q.id, selectedOption: sel });
        document.getElementById("qScore").textContent =
          `${answers.length} đã trả lời`;

        const exp = document.getElementById("explanationBox");
        exp.style.display = "block";
        exp.innerHTML =
          "Đã ghi nhận đáp án. Đáp án đúng và giải thích sẽ hiện sau khi nộp bài.";

        const isLast = currentIdx === questions.length - 1;
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.style.display = "block";
        nextBtn.innerHTML = isLast
          ? '<i class="fas fa-paper-plane"></i> Nộp bài'
          : '<i class="fas fa-arrow-right"></i> Câu tiếp';
      }

      function nextQ() {
        currentIdx++;
        if (currentIdx < questions.length) loadQ();
        else submitQuiz();
      }

      async function submitQuiz() {
        document.getElementById("quizScreen").style.display = "none";
        const chapterArg =
          currentChapter === "__all__" || currentChapter === "__wrong__"
            ? null
            : currentChapter;

        let result;
        try {
          result = await submitPracticeQuiz(chapterArg, answers);
        } catch (err) {
          alert("Lỗi nộp bài: " + err.message);
          document.getElementById("quizScreen").style.display = "block";
          return;
        }

        showResult(result);
        logStudyTime(Math.ceil(questions.length * 0.5)).catch(() => {});
        loadStats();
      }

      function showResult(result) {
        document.getElementById("resultScreen").style.display = "block";
        const pts = result.score;
        document.getElementById("resultScore").textContent = pts;
        document.getElementById("rCorrect").textContent = result.correct;
        document.getElementById("rWrong").textContent =
          result.total - result.correct;
        let emoji = "😔",
          msg = "Cần cố gắng thêm!";
        if (pts >= 9) {
          emoji = "🏆";
          msg = "Xuất sắc!";
        } else if (pts >= 7) {
          emoji = "🎉";
          msg = "Tốt lắm!";
        } else if (pts >= 5) {
          emoji = "👍";
          msg = "Khá tốt! Ôn lại một số phần.";
        }
        document.getElementById("resultEmoji").textContent = emoji;
        document.getElementById("resultMsg").textContent = msg;
        document.getElementById("savedMsg").textContent =
          "✓ Kết quả đã được lưu vào tài khoản (chấm điểm bởi máy chủ)";
        document.getElementById("retryBtn").onclick = () =>
          startQuiz(currentChapter);

        document.getElementById("reviewList").innerHTML = result.details
          .map((d, i) => {
            const q = questions.find((x) => x.id === d.questionId);
            return `<div class="review-item">
      <div style="font-size:0.82rem;font-weight:600;margin-bottom:6px;">${i + 1}. ${q ? q.q : ""}</div>
      <div style="font-size:0.78rem;color:${d.isCorrect ? "#2e7d32" : "var(--red)"};">
        ${d.isCorrect ? "✅ Đúng" : `❌ Sai — Đáp án đúng: ${LETTERS[d.correctAnswer]}`}
      </div>
      ${d.explanation ? `<div style="font-size:0.76rem;color:var(--gray-500);margin-top:3px;">💡 ${d.explanation}</div>` : ""}
    </div>`;
          })
          .join("");
      }

      function exitQuiz() {
        document.getElementById("quizScreen").style.display = "none";
        document.getElementById("resultScreen").style.display = "none";
        document.getElementById("selectScreen").style.display = "block";
      }

      async function loadStats() {
        try {
          const results = await getMyQuizResults();
          const practice = results.filter((r) => r.kind === "practice");
          if (practice.length > 0) {
            document.getElementById("totalDone").textContent = practice.reduce(
              (s, r) => s + r.total,
              0,
            );
            document.getElementById("bestQuiz").textContent = Math.max(
              ...practice.map((r) => r.score),
            ).toFixed(1);
            document.getElementById("quizCount").textContent = practice.length;
          } else {
            document.getElementById("totalDone").textContent = 0;
            document.getElementById("bestQuiz").textContent = "—";
            document.getElementById("quizCount").textContent = 0;
          }
        } catch (e) {}
      }

      function shuffle(arr) {
        return [...arr].sort(() => Math.random() - 0.5);
      }

      // ── Materials for practice page ──
      async function loadMaterialsForPractice() {
        try {
          const data = await listMaterials();
          if (!data || !data.length) return;
          document.getElementById("matCardLT").style.display = "block";
          document.getElementById("matListLT").innerHTML = data
            .map(
              (m) =>
                `<div style="display:flex;align-items:center;gap:10px;background:#fafafa;border:1.5px solid var(--gray-200);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all 0.15s;"
        onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor='var(--gray-200)'"
        onclick="window.open('giang-bai.html?mat=${m.id}','_blank')">
        <span style="font-size:1.1rem;">📄</span>
        <span style="flex:1;font-size:0.79rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.title}</span>
        <span style="font-size:0.62rem;background:var(--red-bg);color:var(--red);padding:2px 7px;border-radius:100px;font-weight:700;flex-shrink:0;">${m.chapter || "Chung"}</span>
        <i class="fas fa-external-link-alt" style="color:var(--gray-400);font-size:0.72rem;flex-shrink:0;"></i>
      </div>`,
            )
            .join("");
        } catch (e) {}
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
